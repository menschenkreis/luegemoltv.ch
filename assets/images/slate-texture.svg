<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400">
  <filter id="noise">
    <feTurbulence type="fractalNoise" baseFrequency="0.032" numOctaves="6" stitchTiles="stitch" result="noise"/>
    <feDiffuseLighting in="noise" lighting-color="#8a8a8a" surfaceScale="2.5" result="lit">
      <feDistantLight azimuth="225" elevation="55"/>
    </feDiffuseLighting>
    <feColorMatrix type="saturate" values="0" result="gray"/>
    <feBlend in="gray" in2="SourceGraphic" mode="multiply"/>
  </filter>
  <rect width="400" height="400" fill="#3a3a3a" filter="url(#noise)"/>
  <!-- Subtle horizontal slate layers -->
  <line x1="0" y1="45" x2="400" y2="48" stroke="#333" stroke-width="0.5" opacity="0.3"/>
  <line x1="0" y1="110" x2="400" y2="108" stroke="#444" stroke-width="0.4" opacity="0.25"/>
  <line x1="0" y1="175" x2="400" y2="178" stroke="#333" stroke-width="0.5" opacity="0.3"/>
  <line x1="0" y1="230" x2="400" y2="227" stroke="#444" stroke-width="0.3" opacity="0.2"/>
  <line x1="0" y1="295" x2="400" y2="298" stroke="#333" stroke-width="0.5" opacity="0.25"/>
  <line x1="0" y1="355" x2="400" y2="352" stroke="#444" stroke-width="0.4" opacity="0.2"/>
</svg>
